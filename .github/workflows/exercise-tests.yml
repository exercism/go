name: Exercise tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Go ${{ matrix.go-version }} - ${{ matrix.os }}/${{ matrix.test-arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.26.x]
        os: [ubuntu-24.04, windows-2025, macOS-latest]
        test-arch: [amd64]
        race: ["-race"]

        include:
          - go-version: 1.26.x
            test-arch: "386"
            os: ubuntu-24.04
            race: ""
          - go-version: 1.26.x
            test-arch: "386"
            os: windows-2025
            race: ""

    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test exercises
        shell: bash
        env:
          GOARCH: ${{ matrix.test-arch }}
        run: ./bin/run-tests
